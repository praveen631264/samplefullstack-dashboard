name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        mvn clean package -DskipTests

    - name: Copy Files to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.jar,frontend/,deploy.sh"
        target: "/home/ubuntu/app"
        strip_components: 0

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 15m
        script: |
          cd /home/ubuntu/app
          
          # Rename JAR for consistency
          mv target/*.jar ./app.jar
          
          # Clean up temporary upload structure
          rm -rf target
          
          # Eradicate zombie processes on port 5000 and port 80
          # Use lsof/kill as fallback if fuser is missing
          sudo fuser -k 5000/tcp 2>/dev/null || true
          sudo fuser -k 80/tcp 2>/dev/null || true
          
          # Fallback kill logic
          sudo kill -9 $(sudo lsof -t -i:5000) 2>/dev/null || true
          sudo kill -9 $(sudo lsof -t -i:80) 2>/dev/null || true
          
          sudo systemctl stop apache2 2>/dev/null || true
          sudo systemctl disable apache2 2>/dev/null || true

          # Stop existing app if running
          sudo pm2 delete test-orchestrator 2>/dev/null || true

          # Start the Spring Boot app with absolute paths
          DB_URL="${{ secrets.DATABASE_URL }}"
          DB_HOST=$(echo $DB_URL | sed -e 's|.*@||' -e 's|:.*||')

          sudo SPRING_DATASOURCE_URL="jdbc:postgresql://$DB_HOST:5432/postgres" \
               SPRING_DATASOURCE_USERNAME="aihackathon" \
               SPRING_DATASOURCE_PASSWORD="aihackathon" \
               SPRING_DATASOURCE_DRIVER="org.postgresql.Driver" \
               SPRING_JPA_DIALECT="org.hibernate.dialect.PostgreSQLDialect" \
               NODE_ENV="production" \
               pm2 start /usr/bin/java --name test-orchestrator -- -jar /home/ubuntu/app/app.jar

          # Diagnostics: Monitoring Startup
          # Note: Build #28 took 156s to boot. We'll wait and then check logs.
          echo "Waiting for application to start..."
          sleep 45
          sudo pm2 status
          # We don't use -no-daemon here to avoid blocking GitHub Actions
          sudo pm2 logs test-orchestrator --lines 100 --no-daemon &
          LOG_PID=$!
          sleep 60
          sudo kill $LOG_PID || true
          
          sudo pm2 save
