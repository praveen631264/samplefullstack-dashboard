# ============================================
# Test orchestrator - Configuration
# ============================================

spring.application.name=Test orchestrator

# ---- Database Configuration ----
# Prioritize environment variables for RDS/Docker, with H2 as a local fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./ca_processor_db;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ---- Server ----
server.port=80
server.servlet.context-path=/

# ---- Swagger/OpenAPI ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---- Fluxnova BPM (BPMN visualized in frontend, definition in resources/ca-event-processing.bpmn) ----

